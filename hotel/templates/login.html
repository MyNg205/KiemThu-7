<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Sandy Hotel & Apartment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #FFF8DC 0%, #FFFACD 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
    }

    .login-container {
      background: white;
      border: 3px solid #D4AF37;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      width: 70vw;
      max-width: 500px;
      padding: 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      background: #D4AF37;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: white;
      font-weight: bold;
    }

    h1 {
      color: #D4AF37;
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #D4AF37;
      font-size: 18px;
      font-style: italic;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      color: #D4AF37;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #DDD;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
    }

    .form-group input::placeholder {
      color: #BBB;
    }

    .error-message {
      color: #E74C3C;
      background: #FADBD8;
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #E74C3C;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #E8A652;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-login:hover {
      background: #D39441;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(232, 166, 82, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .divider {
      margin: 15px 0;
      color: #DDD;
    }

    .signup-link {
      color: #666;
      font-size: 12px;
    }

    .signup-link a {
      color: #D4AF37;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .footer-info {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #EEE;
      color: #999;
      font-size: 11px;
    }

    .footer-info p {
      margin-bottom: 4px;
    }

    .icon {
      margin-right: 8px;
    }

    @media (max-width: 768px) {
      .login-container {
        width: 95vw;
        height: 95vh;
        padding: 3vh 3vw;
      }

      .logo {
        width: 80px;
        height: 80px;
        font-size: 40px;
      }

      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 16px;
      }

      .form-group label {
        font-size: 14px;
      }

      .form-group input {
        padding: 12px 15px;
        font-size: 14px;
      }

      .btn-login {
        padding: 14px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="/static/images/sandy_logo.png" alt="Sandy Hotel Logo" class="logo" style="background: transparent; padding: 0;">
    <h1>ĐĂNG NHẬP</h1>
    <p class="subtitle">"Chào mừng bạn quay lại Khách sạn Sandy!"</p>

    {% if error %}
      <div class="error-message">
        ❌ {{ error }}
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label><span class="icon">📧</span>Email</label>
        <input
          type="email"
          name="username"
          placeholder="admin@example.com"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label><span class="icon">🔐</span>Mật khẩu</label>
        <input
          type="password"
          name="password"
          placeholder="Nhập mật khẩu của bạn!"
          required
        >
      </div>

      <button type="submit" class="btn-login">Đăng nhập</button>
    </form>

    <div class="footer-info">
      <p><span class="icon">📍</span>24/26 An Thương 30, Đà Nẵng</p>
      <p><span class="icon">📞</span>0976543722</p>
      <p><span class="icon">✉️</span>info@sandyhotel.vn</p>
    </div>
  </div>
</body>
</html>
